name: ClaudeUsage
options:
  bundleIdPrefix: com.claude
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  ClaudeUsage:
    type: application
    platform: macOS
    sources:
      - ClaudeUsage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claude.usage
        PRODUCT_NAME: Claude Usage
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: ClaudeUsage/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClaudeUsage/ClaudeUsage.entitlements
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
